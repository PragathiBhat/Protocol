<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#080808" rx="3"/>

  <!-- Antenna tip -->
  <rect x="15.4" y="1.5" width="1.2" height="5.5" fill="#ffcc44" rx="0.5"/>

  <!-- Sphere (observation deck) -->
  <circle cx="16" cy="11.5" r="4.8" fill="#ff7700"/>
  <!-- Sphere highlight -->
  <ellipse cx="14.2" cy="9.8" rx="1.4" ry="1" fill="#ffaa00" opacity="0.7"/>

  <!-- Shaft below sphere -->
  <rect x="15.1" y="16.2" width="1.8" height="7.5" fill="#cc5500" rx="0.4"/>

  <!-- Base platform -->
  <rect x="11.5" y="23.5" width="9" height="1.6" fill="#aa3c00" rx="0.5"/>

  <!-- Tower legs (4 diagonal) -->
  <line x1="12" y1="25.1" x2="8.5" y2="30.5" stroke="#7a2800" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="20" y1="25.1" x2="23.5" y2="30.5" stroke="#7a2800" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="13.5" y1="25.1" x2="11.5" y2="30.5" stroke="#7a2800" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18.5" y1="25.1" x2="20.5" y2="30.5" stroke="#7a2800" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Pink ring around sphere (like the Alexanderplatz pulse ring) -->
  <circle cx="16" cy="11.5" r="6.8" fill="none" stroke="#ff1a78" stroke-width="0.9" opacity="0.9"/>

  <!-- Outer faint ring -->
  <circle cx="16" cy="11.5" r="8.5" fill="none" stroke="#ff1a78" stroke-width="0.5" opacity="0.4"/>
</svg>
